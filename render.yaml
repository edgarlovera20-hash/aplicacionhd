services:
  # ── Web Service (App) ──────────────────────────────────────────────────────
  - type: web
    name: hdreams-crm
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: hdreams-db
          property: connectionString
      # ── IA: Claude (primario) → Gemini (fallback) → OpenAI (último recurso) ──
      - key: ANTHROPIC_API_KEY
        sync: false          # Configura en dashboard. Sin clave Claude no se usa Claude.
      - key: GEMINI_API_KEY
        sync: false          # Fallback. Configura si quieres respaldo cuando Claude falle.
      - key: GEMINI_API_KEY_2
        sync: false          # Opcional: 2da clave Gemini para rotación de cuotas.
      - key: OPENAI_API_KEY
        sync: false          # Último recurso (solo texto). Opcional.
      - key: PASSWORD_SALT
        generateValue: true  # Render genera un valor aleatorio seguro automáticamente
      # ── Twilio (SMS / WhatsApp / llamadas de validación) ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: hdreams-db
    databaseName: hdreams_crm
    user: hdreams_user
    plan: free               # Cambiar a "starter" o "standard" en producción real
