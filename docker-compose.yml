version: "3.9"

services:
  # ── App principal (Node.js + Express + React SPA) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hdreams-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-hdreams_user}:${POSTGRES_PASSWORD:-hdreams_pass}@db:5432/${POSTGRES_DB:-hdreams_crm}
      REDIS_URL: redis://redis:6379
      # IA: cadena de fallback Claude -> Gemini -> OpenAI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_TEXT_MODEL: ${CLAUDE_TEXT_MODEL:-claude-sonnet-4-6}
      CLAUDE_VISION_MODEL: ${CLAUDE_VISION_MODEL:-claude-haiku-4-5}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_2: ${GEMINI_API_KEY_2:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PASSWORD_SALT: ${PASSWORD_SALT:-hdreams_salt_2026}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      # Twilio (SMS / WhatsApp / llamadas de validación)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      # Telegram bots (comma-separated token:name pairs)
      TELEGRAM_BOTS: ${TELEGRAM_BOTS:-}
      # Facebook Messenger
      FACEBOOK_VERIFY_TOKEN: ${FACEBOOK_VERIFY_TOKEN:-hdreams_fb_verify}
      FACEBOOK_PAGE_TOKEN: ${FACEBOOK_PAGE_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hdreams-net

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hdreams-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - hdreams-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hdreams-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hdreams_crm}
      POSTGRES_USER: ${POSTGRES_USER:-hdreams_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hdreams_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hdreams-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hdreams_user} -d ${POSTGRES_DB:-hdreams_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  hdreams-net:
    driver: bridge
